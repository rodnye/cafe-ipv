name: Build Android APK

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: pnpm i

      - name: Build web app
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Assets to Capacitor
        run: pnpm android:sync

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        id: keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./keystore.jks
          echo "KEYSTORE_PATH=$(realpath ./keystore.jks)" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: pnpm android:release
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "APK_NAME=cafe-ipv-$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/${{ steps.get_version.outputs.APK_NAME }}

      - name: Upload APK as artifact (Branch build)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.APK_NAME }}
          path: android/app/build/outputs/apk/release/${{ steps.get_version.outputs.APK_NAME }}
          retention-days: 2

      # create release only if is a tag
      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/${{ steps.get_version.outputs.APK_NAME }}
          generate_release_notes: true
